# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: orbs-indexer
description: Orbs Protocol Indexer - Settled, Fill, Spend, Cancel events
field_selection:
  transaction_fields:
    - hash
contracts:
  - name: Executor
    events:
      - event: "Settled(bytes32 indexed orderHash, address indexed swapper, address indexed exchange, address inToken, address outToken, uint256 inAmount, uint256 outAmount, uint256 minOut)"
  - name: OrderReactor
    events:
      - event: "Fill(bytes32 indexed hash, address indexed executor, address indexed swapper, uint256 epoch)"
  - name: RePermit
    events:
      - event: "Spend(address indexed signer, bytes32 indexed permitHash, address indexed token, address to, uint256 amount, uint256 totalSpent)"
      - event: "Cancel(address indexed signer, bytes32 digest)"
chains:
  - id: 1 # Ethereum
    start_block: 0
    contracts:
      - name: Executor
        address: 0x000eBA869d76C618ddc4A6D685A0820A620Ce002
      - name: OrderReactor
        address: 0x0006a959430e8fBB858D81B2D1140B0ae5c26001
      - name: RePermit
        address: 0x00002a9C4D9497df5Bd31768eC5d30eEf5405000
